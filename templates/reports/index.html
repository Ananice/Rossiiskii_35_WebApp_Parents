{% extends "base/base.html" %}

{% block title %}Отчёты — МУИВ Портал{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12">
        <h2 class="mb-4">
            <i class="fas fa-file-excel text-success"></i> Отчёты и выгрузки
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm h-100">
            <div class="card-body">
                <h5 class="card-title">
                    <i class="fas fa-envelope text-primary"></i> Сообщения
                </h5>
                <p class="card-text text-muted">
                    Выгрузка истории переписки в формате Excel (.xlsx).
                    Содержит дату, отправителя, получателя и текст сообщений.
                </p>
                <a href="{% url 'reports:export_messages_xlsx' %}"
                   class="btn btn-success">
                    <i class="fas fa-download"></i> Скачать .xlsx
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
